services:
  users2-backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: users2-backend
    ports:
      - '8000:8000'
    env_file:
      - ./apps/users2-backend/.env

  manage2-backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: manage2-backend
    ports:
      - '8001:8001'
    env_file:
      - ./apps/manage2-backend/.env

  admin2-backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: admin2-backend
    ports:
      - '8002:8002'
    env_file:
      - ./apps/admin2-backend/.env

  postgres:
    image: postgres:latest
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: portal
    volumes:
      - postgres:/var/lib/postgresql

  postgres-readonly:
    image: postgres:latest
    ports:
      - 5433:5432
    environment:
      POSTGRES_USER: readonly_user
      POSTGRES_PASSWORD: readonly_pass
      POSTGRES_DB: portal
    volumes:
      - postgres-readonly:/var/lib/postgresql

volumes:
  postgres:
  postgres-readonly:
