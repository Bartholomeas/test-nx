name: development

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Which app to deploy (leave empty for affected only)'
        required: false
        type: choice
        options:
          - ''
          - admin2
          - manage2
          - users2
          - all
  push:
    branches:
      - development

env:
  ENV: DEVELOPMENT
  AWS_REGION: us-east-1

jobs:
  params:
    name: Setup Dynamic Environment Variables
    runs-on: ubuntu-latest
    outputs:
      secrets_env: ${{ env.SECRETS_ENV }}
    steps:
      - run: |
          echo "SECRETS_ENV=${{ env.ENV }}" >> $GITHUB_ENV

  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      admin2: ${{ steps.check.outputs.admin2 }}
      manage2: ${{ steps.check.outputs.manage2 }}
      users2: ${{ steps.check.outputs.users2 }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci --no-fund

      - uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: development
          gh-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect affected apps
        id: check
        run: |
          if [ "${{ github.event.inputs.app }}" = "all" ]; then
            echo "admin2=true" >> $GITHUB_OUTPUT
            echo "manage2=true" >> $GITHUB_OUTPUT
            echo "users2=true" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.app }}" ]; then
            echo "admin2=$([[ "${{ github.event.inputs.app }}" == "admin2" ]] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "manage2=$([[ "${{ github.event.inputs.app }}" == "manage2" ]] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "users2=$([[ "${{ github.event.inputs.app }}" == "users2" ]] && echo true || echo false)" >> $GITHUB_OUTPUT
          else
            AFFECTED=$(npx nx show projects --affected --type=app --base "$NX_BASE" --head "$NX_HEAD")
            echo "admin2=$([[ "$AFFECTED" == *"admin2"* ]] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "manage2=$([[ "$AFFECTED" == *"manage2"* ]] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "users2=$([[ "$AFFECTED" == *"users2"* ]] && echo true || echo false)" >> $GITHUB_OUTPUT
          fi

  admin2:
    needs: [detect, params]
    if: needs.detect.outputs.admin2 == 'true'
    uses: ./.github/workflows/build.yml
    with:
      secrets_env: ${{ needs.params.outputs.secrets_env }}
      app_name: admin2
    secrets: inherit

  manage2:
    needs: [detect, params]
    if: needs.detect.outputs.manage2 == 'true'
    uses: ./.github/workflows/build.yml
    with:
      secrets_env: ${{ needs.params.outputs.secrets_env }}
      app_name: manage2
    secrets: inherit

  users2:
    needs: [detect, params]
    if: needs.detect.outputs.users2 == 'true'
    uses: ./.github/workflows/build.yml
    with:
      secrets_env: ${{ needs.params.outputs.secrets_env }}
      app_name: users2
    secrets: inherit
