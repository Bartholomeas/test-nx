name: release

on:
  push:
    branches:
      - development

jobs:
  release:
    # Skip if this push is a release commit (avoid infinite loop)
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    runs-on: ubuntu-latest
    env:
      # Disable Husky for all steps (pre-push runs nx affected against defaultBase e.g. main, which is not present in CI)
      HUSKY: '0'
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci --no-fund

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Version, changelog, git commit/tag, push (--follow-tags), and GitHub releases when createRelease is set in nx.json
      - name: Run nx release
        run: npx nx release --skip-publish
