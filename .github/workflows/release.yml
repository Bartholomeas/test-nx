name: Release

on:
  workflow_call:
    inputs:
      release_env:
        required: true
        type: string
        description: 'Environment prefix for tags (dev | qa | stg | prod)'

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      HUSKY: '0'
      RELEASE_ENV: ${{ inputs.release_env }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci --no-fund

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run environment release
        run: npx tsx tools/release.mts
